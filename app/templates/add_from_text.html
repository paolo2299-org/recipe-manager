{% extends "base.html" %}
{% block title %}Add Recipe from Text - Recipe Manager{% endblock %}
{% block content %}
<p><a href="{{ url_for('recipes.add') }}">&larr; Back</a></p>
<h1>Add Recipe from Text</h1>

<form hx-post="{{ url_for('recipes.extract_text') }}"
      hx-target="#result"
      hx-indicator="#loading"
      hx-encoding="multipart/form-data"
      hx-disabled-elt="button[type='submit']">
    <label for="text_file">Upload a .txt or .md file</label>
    <input type="file" id="text_file" name="text_file" accept=".txt,.md">

    <label for="text">Or paste recipe text</label>
    <textarea id="text" name="text" rows="12" placeholder="Paste your recipe text here..."></textarea>

    <small>Provide a file or paste text. If both are given, the file wins.</small>

    <button type="submit">Extract</button>
</form>

<div id="loading" class="htmx-indicator">
    <article aria-busy="true">
        Extracting recipe with AI... this may take 10-15 seconds.
    </article>
</div>

<div id="result"></div>
{% endblock %}
