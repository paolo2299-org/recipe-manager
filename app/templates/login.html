{% extends "base.html" %}
{% block title %}Sign In - Recipe Manager{% endblock %}
{% block content %}
<section class="auth-shell">
    <article class="auth-card">
        <h1>Sign in with Google</h1>
        <p>Only explicitly approved Google accounts can use this recipe manager.</p>

        {% if auth_error %}
        <article class="auth-error">
            <strong>Sign-in failed</strong>
            <p>{{ auth_error }}</p>
        </article>
        {% endif %}

        <p>
            <a href="{{ url_for('auth.google_login', next=next_path) }}" role="button">
                Continue with Google
            </a>
        </p>
    </article>
</section>
{% endblock %}
