# Railway deployment config. See docs/railway-template.md for how the
# one-click "Deploy on Railway" template is set up.
#
# Note: numReplicas must stay at 1 — the app uses SQLite on a single mounted
# volume, which must not be written by more than one instance.

[build]
builder = "dockerfile"

[deploy]
# Do not set startCommand here. For Dockerfile deployments Railway runs a
# custom start command in exec form, which does not expand $PORT. We rely on
# the Dockerfile CMD instead so the shell can expand Railway's injected port.
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
